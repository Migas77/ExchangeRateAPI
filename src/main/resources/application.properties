spring.application.name=exchange-rate-api
app.clients.exchange-rates.base-url=${EXCHANGE_RATE_API_BASE_URL}
app.clients.exchange-rates.access-key=${EXCHANGE_RATE_API_ACCESS_KEY}
spring.mvc.problemdetails.enabled=true
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
logging.structured.format.console=ecs