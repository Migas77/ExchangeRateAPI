name: Release

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      new_release_published:
        description: "Whether semantic-release published a new release"
        value: ${{ jobs.release.outputs.new_release_published }}

permissions:
  contents: read                                    # for checkout

jobs:

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write                               # to be able to publish a GitHub release
      issues: write                                 # to be able to comment on released issues
      pull-requests: write                          # to be able to comment on released pull requests
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "oracle"
          java-version: "21"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm clean-install
      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures
      
      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          npx --package semantic-release@25.0.8 \
            --package conventional-changelog-conventionalcommits@8.0.0 \
            --package @semantic-release/exec@7.1.0 \
            --package @semantic-release/git@10.0.1 \
            semantic-release
