name: CI

on:
  push:
    branches:
      - 'main'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:

  # test:
  #   uses: ./.github/workflows/test.yml
  #   secrets: inherit

  release:
    # needs: test
    uses: ./.github/workflows/release.yml
    secrets: inherit

  docker-image-build-and-push:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/docker-image-build-and-push.yml
    secrets: inherit
