name: CI

on:
  push:
    branches:
      - 'main'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  tests-and-sonar:
    uses: ./.github/workflows/tests-and-sonar.yml
    secrets: inherit
  release:
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    needs: tests-and-sonar
    uses: ./.github/workflows/release.yml
    secrets: inherit
